spring.application.name=quanlitaichinh

# Database Configuration - Uses environment variables with fallback to localhost
# For production (Render), use DATABASE_URL format: mysql://user:password@host:port/database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/finance_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
# Add configuration for Hibernate to handle enum values correctly
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
# Disable schema initialization since we're using the db_fix.sql script directly
spring.sql.init.mode=never
server.port=8080

# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true

# Logging Configuration - Use INFO level for production
logging.level.com.financeapp=INFO
logging.level.org.springframework.web.client.RestTemplate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.security=INFO

# CORS Configuration - Uses environment variable for production
# Format: http://localhost:3000,http://localhost:5173,https://your-frontend.vercel.app
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=authorization,content-type,x-auth-token
spring.web.cors.exposed-headers=x-auth-token
spring.web.cors.allow-credentials=true

# JWT Configuration
# Use environment variable for production secret (should be at least 64 bytes for HS512)
app.jwt.secret=${JWT_SECRET:NjFiZDVjZDQ3YTJlNDYzZmJmOGZhZWM5YjgwYjQ5YWE4MzRlOWM5ZTM5NzBkZjk5MDkzNTMwYWFmZmJlOWY4YjlkMjk0MWZjNDRhYzFkMTg1ZWM1NjBjMDM3ZWU4MzZlMDZhMzE0YzFkMzI0MzFkNzQ3YzI5MjFkMzM4NGQ=}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# EmailJS Configuration - Use environment variables for production
emailjs.service.id=${EMAILJS_SERVICE_ID:service_fl181h7}
# Create a password reset template in EmailJS with the same structure as the activation template
emailjs.template.reset.id=${EMAILJS_TEMPLATE_RESET_ID:template_o8pq1a4}
emailjs.template.activation.id=${EMAILJS_TEMPLATE_ACTIVATION_ID:template_2g5m1mb}
# Use the same template for contact form or create a new one
emailjs.template.contact.id=${EMAILJS_TEMPLATE_CONTACT_ID:template_2g5m1mb}
emailjs.user.id=${EMAILJS_USER_ID:6xS7gVcnrNq7WUmDe}
emailjs.api.url=https://api.emailjs.com/api/v1.0/email/send

# Application Configuration
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.token.expiry.minutes=30

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/profile-pictures
app.base.url=${BASE_URL:http://localhost:8080}

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=30m
