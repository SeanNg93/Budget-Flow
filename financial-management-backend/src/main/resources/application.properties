spring.application.name=quanlitaichinh

spring.datasource.url=jdbc:mysql://localhost:3306/finance_db
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
# Add configuration for Hibernate to handle enum values correctly
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
# Disable schema initialization since we're using the db_fix.sql script directly
spring.sql.init.mode=never
server.port=8080

# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true

# Logging Configuration
logging.level.com.financeapp=INFO
# Set CustomUserDetailsService to DEBUG level specifically
logging.level.com.financeapp.security.CustomUserDetailsService=DEBUG
logging.level.org.springframework.web.client.RestTemplate=ERROR
# Reduce Hibernate SQL logging
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
# Reduce Spring Security logging
logging.level.org.springframework.security=INFO
logging.level.org.springframework.cache=DEBUG

# CORS Configuration
# When using allowCredentials=true, Origins cannot use wildcard "*"
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=authorization,content-type,x-auth-token
spring.web.cors.exposed-headers=x-auth-token
spring.web.cors.allow-credentials=true

# JWT Configuration
